name: Daily QT Bot

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # 중요: 저장소 쓰기 권한 추가
      contents: write
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4
        
      - name: Run Bot and Create File
        env:
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: python QT_BOT.py
        
      # 생성된 파일을 저장소에 업데이트하는 단계
      - name: Commit and Push Changes
        run: |
          git config --global user.name "qazwsx5381"
          git config --global user.email "qazwsx5381@gmail.com"
          
          # 고정된 파일 하나만 추가
          git add data/today_qt.md
          
          # 내용이 변경되었을 때만 커밋 (중복 실행 방지)
          if git diff --staged --quiet; then
            echo "변경사항이 없습니다."
          else
            git commit -m "Update daily QT: $(date +'%Y-%m-%d')"
            git push
          fi
